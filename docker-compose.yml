version: '3'

services:
  bot:
    image: your_bot_image_name
    container_name: polymarket_bot
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/db_name
    depends_on:
      - db
    ports:
      - "8080:8080"

  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=db_name
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: